<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPM Atlas</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004B23", // Deep Green
                        "secondary": "#E9C176", // Muted Gold (Gilt)
                        "background": "#0E0E0E", // Obsidian
                        "surface": "#131313",
                        "on-surface": "#E0E0E0", // Soft White
                        "on-surface-variant": "#8A9389", // Muted Grey-Green
                        "surface-container-low": "#1C1B1B",
                        "surface-container-high": "#2A2A2A",
                        "outline": "#404941",
                        "error": "#93000a",
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem", 
                        "lg": "0.25rem", 
                        "xl": "0.5rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pitch-gradient {
            background: linear-gradient(90deg, #0E0E0E 0%, #1C1B1B 50%, #0E0E0E 100%);
        }
        .pitch-pattern {
            background-image: radial-gradient(circle at 1px 1px, rgba(233, 193, 118, 0.03) 1px, transparent 0);
            background-size: 48px 48px;
        }
        .caret-custom {
            width: 1px;
            height: 1.4em;
            background-color: #E9C176;
            display: inline-block;
            vertical-align: middle;
            margin-left: -1px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/40 min-h-screen flex flex-col">
    <header class="bg-[#131313] dark:bg-[#0E0E0E] flex justify-between items-center w-full px-8 py-4 max-w-none sticky top-0 z-50 bg-[#1C1B1B] border-b border-outline/10">
        <div class="flex items-center gap-12">
            <span class="text-2xl font-bold tracking-tighter text-[#E9C176] uppercase font-['Manrope'] cursor-pointer" onclick="window.location.reload()">WPM Atlas</span>
            <nav class="hidden md:flex items-center space-x-10 font-['Manrope'] text-sm uppercase font-semibold tracking-tight">
                <button id="nav-play" class="nav-btn text-[#93D6A0] border-b-2 border-[#004B23] pb-1">Play</button>
                <button id="nav-countries" class="nav-btn text-[#8A9389] hover:text-[#E0E0E0] transition-colors pb-1 border-b-2 border-transparent">Countries</button>
                <button id="nav-leaderboard" class="nav-btn text-[#8A9389] hover:text-[#E0E0E0] transition-colors pb-1 border-b-2 border-transparent">Leaderboard</button>
                <button id="nav-multiplayer" class="nav-btn text-[#8A9389] hover:text-[#E0E0E0] transition-colors pb-1 border-b-2 border-transparent">Multiplayer</button>
            </nav>
        </div>
        <div class="flex items-center gap-2 relative">
            <button id="notification-btn" class="p-2 text-[#8A9389] hover:text-[#E0E0E0] transition-transform scale-95 active:opacity-80 relative" type="button" aria-label="Open notifications">
                <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
                <span id="notif-badge" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-error rounded-full border border-[#131313]"></span>
            </button>

            <div id="notification-sidebar" class="fixed top-0 right-0 h-full w-80 max-w-[calc(100vw-1.5rem)] bg-[#1C1B1B] border-l border-[#404941]/40 shadow-2xl transform translate-x-full transition-transform duration-300 ease-out z-[60] flex flex-col">
                <div class="flex items-center justify-between px-6 py-5 border-b border-[#404941]/30">
                    <div>
                        <p class="text-[10px] uppercase tracking-[0.3em] text-[#8A9389]">Notifications</p>
                        <h4 class="text-lg font-headline font-bold text-[#E9C176] uppercase tracking-tight mt-1">Inbox</h4>
                    </div>
                    <button id="notification-close-btn" class="w-9 h-9 rounded-full border border-[#404941]/50 text-[#E0E0E0] hover:border-[#E9C176]/40 hover:text-[#E9C176] transition-colors" type="button" aria-label="Close notifications">
                        <span class="material-symbols-outlined text-base">close</span>
                    </button>
                </div>
                <div id="notification-list" class="flex-1 flex items-center justify-center px-6 py-8">
                    <p class="text-sm text-[#8A9389] uppercase tracking-[0.2em] text-center" id="empty-notif">No new notifications</p>
                </div>
            </div>

            <div class="relative">
                <div id="profile-action-root" class="flex items-center"></div>
                <div id="login-container" class="hidden"></div>
            </div>
        </div>
    </header>

    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute inset-0 pitch-pattern"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-gradient-to-b from-primary/5 to-transparent"></div>
    </div>

    <main id="main-content" class="relative z-10 flex-grow flex flex-col items-center justify-start pt-12 pb-24 px-8 max-w-6xl mx-auto w-full">
    </main>

    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-[#1C1B1B]/95 backdrop-blur-2xl rounded-t-xl border-t border-outline/10">
        <button id="nav-mob-play" class="flex flex-col items-center justify-center text-[#E9C176] transition-all duration-300">
            <span class="material-symbols-outlined" data-icon="public" style="font-variation-settings: 'FILL' 1;">public</span>
            <span class="font-['Manrope'] text-[9px] uppercase tracking-widest mt-1.5 font-bold">Play</span>
        </button>
        <button id="nav-mob-countries" class="flex flex-col items-center justify-center text-[#8A9389] opacity-60 px-4 py-2 hover:opacity-100 transition-all duration-300">
            <span class="material-symbols-outlined" data-icon="map">map</span>
            <span class="font-['Manrope'] text-[9px] uppercase tracking-widest mt-1.5 font-bold">Countries</span>
        </button>
        <button id="nav-mob-leaderboard" class="flex flex-col items-center justify-center text-[#8A9389] opacity-60 px-4 py-2 hover:opacity-100 transition-all duration-300">
            <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
            <span class="font-['Manrope'] text-[9px] uppercase tracking-widest mt-1.5 font-bold">Rankings</span>
        </button>
        <button id="nav-mob-multiplayer" class="flex flex-col items-center justify-center text-[#8A9389] opacity-60 px-4 py-2 hover:opacity-100 transition-all duration-300">
            <span class="material-symbols-outlined" data-icon="groups">groups</span>
            <span class="font-['Manrope'] text-[9px] uppercase tracking-widest mt-1.5 font-bold">Multi</span>
        </button>
    </nav>

    <script type="module" src="js/main.js"></script>
</body>
</html>
