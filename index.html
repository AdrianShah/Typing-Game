<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WPM Pitch</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#004B23", // Deep Green
                        "secondary": "#E9C176", // Muted Gold (Gilt)
                        "background": "#0E0E0E", // Obsidian
                        "surface": "#131313",
                        "on-surface": "#E0E0E0", // Soft White
                        "on-surface-variant": "#8A9389", // Muted Grey-Green
                        "surface-container-low": "#1C1B1B",
                        "surface-container-high": "#2A2A2A",
                        "outline": "#404941",
                        "error": "#93000a",
                    },
                    fontFamily: {
                        "headline": ["Manrope", "sans-serif"],
                        "body": ["Inter", "sans-serif"],
                        "label": ["Manrope", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem", 
                        "lg": "0.25rem", 
                        "xl": "0.5rem", 
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pitch-gradient {
            background: linear-gradient(90deg, #0E0E0E 0%, #1C1B1B 50%, #0E0E0E 100%);
        }
        .pitch-pattern {
            background-image: radial-gradient(circle at 1px 1px, rgba(233, 193, 118, 0.03) 1px, transparent 0);
            background-size: 48px 48px;
        }
        .caret-custom {
            width: 1px;
            height: 1.4em;
            background-color: #E9C176;
            display: inline-block;
            vertical-align: middle;
            margin-left: -1px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            from, to { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/40 min-h-screen flex flex-col">
    <!-- TopAppBar -->
    <header class="bg-[#131313] dark:bg-[#0E0E0E] flex justify-between items-center w-full px-8 py-4 max-w-none sticky top-0 z-50 bg-[#1C1B1B] border-b border-outline/10">
        <div class="flex items-center gap-12">
            <span class="text-2xl font-bold tracking-tighter text-[#E9C176] uppercase font-['Manrope'] cursor-pointer" onclick="window.location.reload()">WPM Pitch</span>
            <nav class="hidden md:flex items-center space-x-10 font-['Manrope'] text-sm uppercase font-semibold tracking-tight">
                <button id="nav-play" class="nav-btn text-[#93D6A0] border-b-2 border-[#004B23] pb-1">Arena</button>
                <button id="nav-teams" class="nav-btn text-[#8A9389] hover:text-[#E0E0E0] transition-colors pb-1 border-b-2 border-transparent">Clubs</button>
                <button id="nav-leaderboard" class="nav-btn text-[#8A9389] hover:text-[#E0E0E0] transition-colors pb-1 border-b-2 border-transparent">Leaderboard</button>
            </nav>
        </div>
        <div class="flex items-center gap-6 relative">
            <button id="notification-btn" class="p-2 text-[#8A9389] hover:text-[#E0E0E0] transition-transform scale-95 active:opacity-80 relative">
                <span class="material-symbols-outlined" data-icon="notifications">notifications</span>
                <span id="notif-badge" class="hidden absolute top-1 right-1 w-2.5 h-2.5 bg-error rounded-full border border-[#131313]"></span>
            </button>
            
            <!-- Notification Dropdown -->
            <div id="notification-dropdown" class="hidden absolute top-14 right-12 w-64 bg-[#1C1B1B] border border-outline/10 shadow-2xl rounded-lg p-4 z-50">
                <h4 class="text-[10px] uppercase tracking-widest text-[#8A9389] mb-3">Notifications</h4>
                <div id="notification-list" class="space-y-2">
                    <p class="text-xs text-on-surface-variant italic" id="empty-notif">No new notifications</p>
                </div>
            </div>

            <!-- Profile / Login -->
            <div class="relative">
                <div id="profile-btn" class="w-10 h-10 rounded-full border border-outline/20 overflow-hidden grayscale hover:grayscale-0 transition-all duration-500 bg-surface-container-high cursor-pointer">
                    <img alt="Player" class="w-full h-full object-cover opacity-80" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBrdaw3lKhrhtjhs0_rDX-3HlkoP09bDfsEoP664YNXPL50PtgQA7esw8SLFJJQZDb8P6Gse9niEncx92pSfbjt2UHfG2zAVIgXTI9R38G1x3383h1jdVSkHtnRjUnF98HXmS0dcqsoX61ejve_2jX9wnzN8EissXm62Yy8nVIq88OfiN3dbBlyNmrRNaDMn6Gf8N6RHYYvxiVHy-lhqz6UwZAznrEinXG_9M6Tt4vTYBlT3sV9TdrEXEycwSEqkaLVwenlwTCStaE"/>
                </div>
                
                <!-- Login Dropdown -->
                <div id="login-dropdown" class="hidden absolute top-14 right-0 w-72 bg-[rgba(19,19,19,0.95)] backdrop-blur-xl border border-outline/10 shadow-2xl overflow-hidden rounded-lg z-50">
                    <div class="p-6 space-y-6" id="login-container">
                        <div class="space-y-2">
                            <label class="block text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant ml-0.5">Captain ID</label>
                            <input class="w-full bg-[#1C1B1B] border border-outline/10 py-3 px-3 text-[#E0E0E0] text-sm focus:outline-none focus:border-[#E9C176]/30 transition-all duration-300" placeholder="Email Address" type="text" id="login-email" />
                        </div>
                        <button id="btn-login-submit" class="w-full bg-[#004B23] text-white font-headline font-bold uppercase tracking-[0.2em] text-[10px] py-3 hover:bg-[#005a2b] transition-all duration-300" type="button">
                            Login / Sign Up
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>
    
    <!-- Background Patterns -->
    <div class="fixed inset-0 z-0 pointer-events-none overflow-hidden">
        <div class="absolute inset-0 pitch-pattern"></div>
        <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full h-[500px] bg-gradient-to-b from-primary/5 to-transparent"></div>
    </div>
    
    <main id="main-content" class="relative z-10 flex-grow flex flex-col items-center justify-start pt-12 pb-24 px-8 max-w-6xl mx-auto w-full">
        <!-- Dynamic content goes here -->
    </main>

    <!-- BottomNavBar (Mobile Only) -->
    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pb-8 pt-4 bg-[#1C1B1B]/95 backdrop-blur-2xl rounded-t-xl border-t border-outline/10">
        <button id="nav-mob-play" class="flex flex-col items-center justify-center text-[#E9C176] transition-all duration-300">
            <span class="material-symbols-outlined" data-icon="sports_soccer" style="font-variation-settings: 'FILL' 1;">sports_soccer</span>
            <span class="font-['Manrope'] text-[9px] uppercase tracking-widest mt-1.5 font-bold">Play</span>
        </button>
        <button id="nav-mob-teams" class="flex flex-col items-center justify-center text-[#8A9389] opacity-60 px-4 py-2 hover:opacity-100 transition-all duration-300">
            <span class="material-symbols-outlined" data-icon="groups">groups</span>
            <span class="font-['Manrope'] text-[9px] uppercase tracking-widest mt-1.5 font-bold">Clubs</span>
        </button>
        <button id="nav-mob-leaderboard" class="flex flex-col items-center justify-center text-[#8A9389] opacity-60 px-4 py-2 hover:opacity-100 transition-all duration-300">
            <span class="material-symbols-outlined" data-icon="leaderboard">leaderboard</span>
            <span class="font-['Manrope'] text-[9px] uppercase tracking-widest mt-1.5 font-bold">Rankings</span>
        </button>
    </nav>

    <!-- Scripts -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
